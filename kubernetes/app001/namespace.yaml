apiVersion: v1
kind: Namespace
metadata:
  name: app001-prod
  labels:
    environment: prod
    owner: app001-team
    azure.workload.identity/use: "true"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: app001-prod-quota
  namespace: app001-prod
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 32Gi
    limits.cpu: "16"
    limits.memory: 64Gi
    pods: "50"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: app001-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
