apiVersion: apps/v1
kind: Deployment
metadata:
  name: app001-api
  namespace: app001-prod
  labels:
    app: app001-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app001-api
  template:
    metadata:
      labels:
        app: app001-api
        azure.workload.identity/use: "true"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: app001-api
          image: acrcontosoapp001prod.azurecr.io/app001-api:1.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: app001-api
  namespace: app001-prod
spec:
  selector:
    app: app001-api
  ports:
    - port: 80
      targetPort: 8080
