<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Executive Azure Enterprise Landing Zone Architecture</title>
  <desc id="desc">Governance-first Azure landing zone architecture showing identity, Microsoft 365 and Intune, platform subscriptions, workload landing zones, security operations, and GitHub Actions automation.</desc>
  <rect width="1400" height="900" fill="#f7f9fc"/>
  <rect x="40" y="34" width="1320" height="92" rx="14" fill="#0f4c81"/>
  <text x="70" y="88" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700">Azure Enterprise Landing Zone Reference</text>
  <text x="70" y="116" fill="#d8e9ff" font-family="Segoe UI, Arial, sans-serif" font-size="18">Governance-first cloud foundation with identity, security, networking, automation, and workload onboarding</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="60" y="170" width="310" height="145" rx="12" fill="#ffffff" stroke="#2f6fbb" stroke-width="2"/>
    <text x="88" y="210" fill="#0f4c81" font-size="22" font-weight="700">Governance Foundation</text>
    <text x="88" y="246" fill="#1f2937" font-size="17">Management groups</text>
    <text x="88" y="274" fill="#1f2937" font-size="17">Azure Policy guardrails</text>
    <text x="88" y="302" fill="#1f2937" font-size="17">RBAC, PIM, tagging, budgets</text>

    <rect x="545" y="170" width="310" height="145" rx="12" fill="#ffffff" stroke="#2f6fbb" stroke-width="2"/>
    <text x="573" y="210" fill="#0f4c81" font-size="22" font-weight="700">Identity And Access</text>
    <text x="573" y="246" fill="#1f2937" font-size="17">Okta to Microsoft Entra ID</text>
    <text x="573" y="274" fill="#1f2937" font-size="17">Conditional Access</text>
    <text x="573" y="302" fill="#1f2937" font-size="17">OIDC workload federation</text>

    <rect x="1030" y="170" width="310" height="145" rx="12" fill="#ffffff" stroke="#2f6fbb" stroke-width="2"/>
    <text x="1058" y="210" fill="#0f4c81" font-size="22" font-weight="700">Microsoft 365 Endpoint</text>
    <text x="1058" y="246" fill="#1f2937" font-size="17">Intune baselines</text>
    <text x="1058" y="274" fill="#1f2937" font-size="17">Defender for Endpoint</text>
    <text x="1058" y="302" fill="#1f2937" font-size="17">Teams, Exchange, SharePoint</text>

    <rect x="60" y="390" width="310" height="170" rx="12" fill="#ffffff" stroke="#1d8a5a" stroke-width="2"/>
    <text x="88" y="432" fill="#0f6b45" font-size="22" font-weight="700">Platform Subscriptions</text>
    <text x="88" y="468" fill="#1f2937" font-size="17">Hub-spoke network</text>
    <text x="88" y="496" fill="#1f2937" font-size="17">Private DNS and shared services</text>
    <text x="88" y="524" fill="#1f2937" font-size="17">Log Analytics and alerting</text>

    <rect x="545" y="390" width="310" height="170" rx="12" fill="#ffffff" stroke="#1d8a5a" stroke-width="2"/>
    <text x="573" y="432" fill="#0f6b45" font-size="22" font-weight="700">Security Operations</text>
    <text x="573" y="468" fill="#1f2937" font-size="17">Microsoft Defender for Cloud</text>
    <text x="573" y="496" fill="#1f2937" font-size="17">Defender plans and posture</text>
    <text x="573" y="524" fill="#1f2937" font-size="17">Sentinel-ready central logs</text>

    <rect x="1030" y="390" width="310" height="170" rx="12" fill="#ffffff" stroke="#1d8a5a" stroke-width="2"/>
    <text x="1058" y="432" fill="#0f6b45" font-size="22" font-weight="700">Workload Landing Zone</text>
    <text x="1058" y="468" fill="#1f2937" font-size="17">Private AKS</text>
    <text x="1058" y="496" fill="#1f2937" font-size="17">ACR, Key Vault, workload identity</text>
    <text x="1058" y="524" fill="#1f2937" font-size="17">Autoscaling and policy controls</text>

    <rect x="300" y="655" width="800" height="150" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
    <text x="335" y="700" fill="#5b21b6" font-size="24" font-weight="700">Automation And Evidence</text>
    <text x="335" y="738" fill="#1f2937" font-size="18">GitHub Actions validates Terraform, builds Bicep, reports Checkov findings, and gates production apply.</text>
    <text x="335" y="770" fill="#1f2937" font-size="18">Manual approval, OIDC federation, preflight checks, ADRs, cost governance, and sanitized plan evidence.</text>
  </g>

  <g stroke="#637083" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#637083"/>
      </marker>
    </defs>
    <path d="M370 242 H545"/>
    <path d="M855 242 H1030"/>
    <path d="M215 315 V390"/>
    <path d="M700 315 V390"/>
    <path d="M1185 315 V390"/>
    <path d="M370 475 H545"/>
    <path d="M855 475 H1030"/>
    <path d="M700 560 V655"/>
  </g>
</svg>
