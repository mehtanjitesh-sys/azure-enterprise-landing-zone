name: terraform-apply

on:
  workflow_dispatch:
    inputs:
      confirm_environment:
        description: "Type production to confirm the target environment."
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: 45bd8ad3-d00c-4a0a-8ea6-631cb046bd84
  AZURE_TENANT_ID: d4957708-1706-4a44-a2de-387b7e78061e
  AZURE_SUBSCRIPTION_ID: 95fa9d6d-be96-4f52-9889-c15d451ec289

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform/envs/prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight Azure and Terraform configuration
        env:
          AZURE_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ env.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
          TF_STATE_RG: ${{ vars.TF_STATE_RG }}
          TF_STATE_STORAGE_ACCOUNT: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
          TF_STATE_CONTAINER: ${{ vars.TF_STATE_CONTAINER }}
          CONFIRM_ENVIRONMENT: ${{ github.event.inputs.confirm_environment }}
        run: |
          missing=0
          if [ "$CONFIRM_ENVIRONMENT" != "production" ]; then
            echo "::error title=Production confirmation required::Re-run this workflow and type production in the confirm_environment input."
            missing=1
          fi
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID TF_STATE_RG TF_STATE_STORAGE_ACCOUNT TF_STATE_CONTAINER; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub configuration::$name is required in the production environment before Terraform can authenticate or initialize remote state."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=prod.tfstate"

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
