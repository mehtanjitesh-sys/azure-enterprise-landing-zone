name: kubernetes-deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: 45bd8ad3-d00c-4a0a-8ea6-631cb046bd84
  AZURE_TENANT_ID: d4957708-1706-4a44-a2de-387b7e78061e
  AZURE_SUBSCRIPTION_ID: 95fa9d6d-be96-4f52-9889-c15d451ec289

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight Azure and AKS configuration
        env:
          AZURE_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ env.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
          AKS_RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
        run: |
          missing=0
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AKS_RESOURCE_GROUP AKS_CLUSTER_NAME; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub configuration::$name is required in the production environment before AKS deployment can authenticate or locate the cluster."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group ${{ vars.AKS_RESOURCE_GROUP }} --name ${{ vars.AKS_CLUSTER_NAME }} --overwrite-existing

      - name: Deploy namespace controls
        run: kubectl apply -f kubernetes/app001/namespace.yaml

      - name: Deploy application
        run: kubectl apply -f kubernetes/app001/deployment.yaml

      - name: Deploy autoscaling
        run: kubectl apply -f kubernetes/app001/hpa.yaml
