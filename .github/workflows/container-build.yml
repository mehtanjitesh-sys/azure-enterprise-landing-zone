name: container-build

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag to build and push."
        required: true
        default: "manual"
        type: string

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: 45bd8ad3-d00c-4a0a-8ea6-631cb046bd84
  AZURE_TENANT_ID: d4957708-1706-4a44-a2de-387b7e78061e
  AZURE_SUBSCRIPTION_ID: 95fa9d6d-be96-4f52-9889-c15d451ec289

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight Azure and ACR configuration
        env:
          AZURE_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ env.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
        run: |
          missing=0
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID ACR_NAME ACR_LOGIN_SERVER; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub configuration::$name is required before container build can authenticate or push to ACR."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build container
        run: docker build -t ${{ vars.ACR_LOGIN_SERVER }}/app001-api:${{ github.event.inputs.image_tag }} src/app001-api

      - name: Push container
        run: docker push ${{ vars.ACR_LOGIN_SERVER }}/app001-api:${{ github.event.inputs.image_tag }}
