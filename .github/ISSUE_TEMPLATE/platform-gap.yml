name: Platform gap
description: Track a missing enterprise landing zone capability or hardening item.
title: "Platform gap: "
labels:
  - platform
  - backlog
body:
  - type: textarea
    id: gap
    attributes:
      label: Gap
      description: What is missing or not yet production-ready?
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - Governance
        - Identity
        - Network
        - Security
        - Observability
        - AKS
        - Microsoft 365 / Intune
        - CI/CD
        - Cost Management
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What proof would close this gap?
    validations:
      required: true
